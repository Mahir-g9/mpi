<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Album App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f4f4f4;
    }
    button {
      padding: 15px 30px;
      margin: 20px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }
    .btn-upload { background: #4CAF50; }
    .btn-upload:hover { background: #45a049; }
    .btn-view { background: #2196F3; }
    .btn-view:hover { background: #1976D2; }
  </style>
</head>
<body>

<h1>Welcome to My Album App</h1>
<button class="btn-upload" onclick="window.location='uploader.html'">Go to Uploader</button>
<button class="btn-view" onclick="window.location='view.html'">Test / View Album</button>

</body>
</html>
